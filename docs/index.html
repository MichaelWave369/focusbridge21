<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusBridge21 v1.1 Live App</title>
  <meta name="description" content="FocusBridge21 v1.1 live React/PWA cockpit with guided practice flow, Web Audio, local receipts, Smart Coach, labs, Release Hub, and unified Command Hub." />
  <meta name="theme-color" content="#070712" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="FocusBridge21" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="upgrade.css" />
  <link rel="stylesheet" href="pwa-coach.css" />
  <link rel="stylesheet" href="pattern-lab.css" />
  <link rel="stylesheet" href="fb21-v06-lab.css" />
  <link rel="stylesheet" href="fb21-v07-masterylab.css" />
  <link rel="stylesheet" href="fb21-v08-guidancelab.css" />
  <link rel="stylesheet" href="fb21-v09-audiolab.css" />
  <link rel="stylesheet" href="fb21-v10-releasehub.css" />
  <link rel="stylesheet" href="fb21-v10-layout-fix.css" />
  <link rel="stylesheet" href="fb21-v11-commandhub.css" />
</head>
<body>
  <noscript>
    <div style="max-width: 800px; margin: 4rem auto; padding: 1.5rem; font-family: system-ui; color: white; background: #151522; border-radius: 1rem;">
      FocusBridge21 needs JavaScript enabled to run the browser app.
    </div>
  </noscript>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="fb21-react.js"></script>
  <script src="fb21-pwa-coach.js"></script>
  <script src="fb21-pattern-lab.js"></script>
  <script src="fb21-v06-lab.js"></script>
  <script src="fb21-v07-masterylab.js"></script>
  <script src="fb21-v08-guidancelab.js"></script>
  <script src="fb21-v09-audiolab.js"></script>
  <script src="fb21-v10-releasehub.js"></script>
  <script src="fb21-v11-commandhub.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("../service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
